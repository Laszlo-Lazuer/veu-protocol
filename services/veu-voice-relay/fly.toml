app = "veu-voice-relay"
primary_region = "dfw"
kill_signal = "SIGTERM"
kill_timeout = 30

[build]

[env]
  VEU_VOICE_RELAY_PORT = "8080"
  VEU_APNS_BUNDLE_ID = "com.squirrelyeye.veu"
  # APNs secrets (set via `fly secrets set`):
  #   VEU_APNS_KEY_PATH  - path to .p8 auth key (or mount as volume)
  #   VEU_APNS_KEY_ID    - 10-char key ID from Apple
  #   VEU_APNS_TEAM_ID   - 10-char team ID from Apple
  #   VEU_APNS_SANDBOX   - "true" for development builds

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  [http_service.http_options]
    idle_timeout = 600

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
  cpu_kind = "shared"

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
