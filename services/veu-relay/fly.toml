app = "veu-relay"
primary_region = "iad"

[build]

[env]
  VEU_RELAY_PORT = "8080"
  VEU_RELAY_DB_PATH = "/data/veu-relay.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "veu_data"
  destination = "/data"

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
