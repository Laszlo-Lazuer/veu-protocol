app = "veu-relay"
primary_region = "dfw"
kill_signal = "SIGTERM"
kill_timeout = 30

[build]

[env]
  VEU_RELAY_PORT = "8080"
  VEU_RELAY_DB_PATH = "/data/veu-relay.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  [http_service.http_options]
    idle_timeout = 600

[[mounts]]
  source = "veu_data"
  destination = "/data"
  snapshot_retention = 14

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
  cpu_kind = "shared"

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
